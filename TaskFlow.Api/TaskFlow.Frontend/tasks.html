<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Мої завдання</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #020617; 
            --text-main: #f8fafc; 
            --glass-bg: rgba(15, 23, 42, 0.6); 
            --border: rgba(255, 255, 255, 0.05); 
            --card-bg: rgba(30, 41, 59, 0.5);
        }
        .light-theme { 
            --bg-color: #f8fafc; 
            --text-main: #0f172a; 
            --glass-bg: rgba(255, 255, 255, 0.7); 
            --border: rgba(0, 0, 0, 0.05); 
            --card-bg: #ffffff;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            transition: all 0.5s ease; 
            min-height: 100vh;
        }
        .glass { 
            background: var(--glass-bg); 
            backdrop-filter: blur(16px); 
            border: 1px solid var(--border); 
        }
        .task-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }
        .task-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px -10px rgba(79, 70, 229, 0.3);
        }
    </style>
</head>
<body class="pt-24 px-6">

    <nav class="fixed top-0 left-0 w-full z-50 glass border-b">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-extrabold flex items-center gap-2">
                <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center text-white">✓</div>
                TaskFlow
            </a>
            
            <div class="flex items-center gap-4">
                <button id="themeToggle" class="p-2.5 rounded-xl border border-white/10 glass hover:scale-110 transition-transform">
                    <span id="themeIcon">🌙</span>
                </button>
                <div class="h-8 w-[1px] bg-white/10 mx-2"></div>
                <button onclick="logout()" class="text-sm font-bold text-red-400 hover:text-red-300 transition">Вийти</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto py-10">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-12 gap-6">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight mb-2">Привіт, Рома! 👋</h1>
                <p class="text-slate-400">Сьогодні у тебе <span class="text-indigo-400 font-bold">3 активних завдання</span>.</p>
            </div>
            <button class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-xl shadow-indigo-500/20 transition-all flex items-center gap-2">
                <span class="text-xl">+</span> Нове завдання
            </button>
        </div>

        <div class="space-y-4">
            <div class="task-card p-6 rounded-[28px] flex items-center justify-between group">
                <div class="flex items-center gap-4">
                    <div class="w-6 h-6 border-2 border-indigo-500 rounded-lg flex items-center justify-center cursor-pointer hover:bg-indigo-500/20 transition"></div>
                    <div>
                        <h3 class="font-bold text-lg">Зробити рев'ю коду бекенду</h3>
                        <p class="text-sm text-slate-500 text-muted">Контролер AuthController.cs потребує перевірки</p>
                    </div>
                </div>
                <span class="px-3 py-1 bg-indigo-500/10 text-indigo-400 text-xs font-bold rounded-full border border-indigo-500/20">Важливо</span>
            </div>

            <div class="task-card p-6 rounded-[28px] flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-6 h-6 border-2 border-slate-600 rounded-lg"></div>
                    <div>
                        <h3 class="font-bold text-lg">Налаштувати темну тему</h3>
                        <p class="text-sm text-slate-500">Додати ThemeSwitcher на всі сторінки</p>
                    </div>
                </div>
                <span class="px-3 py-1 bg-emerald-500/10 text-emerald-400 text-xs font-bold rounded-full border border-emerald-500/20">В процесі</span>
            </div>
        </div>
    </main>

    <script>
        const btn = document.getElementById('themeToggle');
        const icon = document.getElementById('themeIcon');
        
        function updateTheme() {
            const isLight = localStorage.getItem('theme') === 'light';
            if (isLight) {
                document.body.classList.add('light-theme');
                icon.innerText = '☀️';
            } else {
                document.body.classList.remove('light-theme');
                icon.innerText = '🌙';
            }
        }

        updateTheme();

        btn.addEventListener('click', () => {
            const isLight = document.body.classList.toggle('light-theme');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            icon.innerText = isLight ? '☀️' : '🌙';
        });

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
