<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дашборд - TaskFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow: hidden; }
        /* Кастомний скролбар для списку завдань */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen">

    <script>
        if (!localStorage.getItem('token')) {
            window.location.replace('login.html');
        }
    </script>

    <aside class="w-64 bg-[#0f172a] text-white flex flex-col h-full shadow-xl z-20">
        <div class="h-20 flex items-center px-6 border-b border-white/10">
            <a href="index.html" class="text-xl font-bold flex items-center gap-3">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="text-indigo-500">
                    <path d="M2 12L12 17L22 12M2 7L12 12L22 7M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                TaskFlow
            </a>
        </div>

        <div class="flex-1 overflow-y-auto py-6 flex flex-col custom-scrollbar">
            <span class="px-6 text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Мої проєкти</span>
            <ul id="projectList" class="space-y-1 px-3">
                </ul>
        </div>

        <form id="projectForm" class="p-4 border-t border-white/10 flex gap-2">
            <input type="text" id="newProjectInput" required placeholder="Новий проєкт..." class="flex-1 bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500 transition">
            <button type="submit" class="w-10 h-10 bg-indigo-600 hover:bg-indigo-700 rounded-lg flex items-center justify-center text-white transition shadow-lg">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
            </button>
        </form>
    </aside>

    <main class="flex-1 flex flex-col h-full bg-white relative">
        
        <header class="h-20 border-b border-slate-200 px-8 flex items-center justify-between bg-white z-10">
            <div class="flex-1">
                <div class="flex items-center gap-3 mb-1">
                    <svg width="24" height="24" fill="none" viewBox="0 0 24 24" class="text-amber-400"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" fill="currentColor"/></svg>
                    <h1 id="currentProjectTitle" class="text-2xl font-bold text-slate-800">Оберіть проєкт</h1>
                </div>
                <div class="flex items-center gap-4 max-w-md">
                    <span class="text-xs font-semibold text-slate-500 w-32">Прогрес виконання:</span>
                    <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                        <div id="progressBar" class="h-full bg-indigo-500 rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                    <span id="progressText" class="text-xs font-bold text-slate-700 w-8">0%</span>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="deleteCurrentProject()" class="text-rose-500 hover:text-rose-600 font-semibold text-sm flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-rose-50 transition">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    Видалити проєкт
                </button>
                <button onclick="logout()" class="text-slate-600 hover:text-slate-900 font-semibold text-sm bg-slate-100 hover:bg-slate-200 px-6 py-2 rounded-lg transition">
                    Вийти
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 bg-[#f8fafc]">
            
            <form id="taskForm" class="bg-white p-2 rounded-xl border border-slate-200 shadow-sm flex gap-2 mb-8 items-center">
                <input type="text" id="taskTitle" required placeholder="Що потрібно зробити?" class="flex-1 px-4 py-3 bg-transparent text-slate-800 focus:outline-none text-sm font-medium">
                
                <div class="w-[1px] h-8 bg-slate-200"></div>
                
                <input type="text" id="taskDesc" placeholder="Деталі (необов'язково)..." class="w-1/3 px-4 py-3 bg-transparent text-slate-600 focus:outline-none text-sm">
                
                <div class="w-[1px] h-8 bg-slate-200"></div>
                
                <input type="date" id="taskDate" class="px-4 py-3 bg-transparent text-slate-600 focus:outline-none text-sm cursor-pointer">
                
                <button type="submit" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-sm rounded-lg transition shadow-md shadow-indigo-200 whitespace-nowrap">
                    Додати завдання
                </button>
            </form>

            <div id="tasksContainer" class="space-y-3">
                </div>

            <div id="emptyState" class="hidden border-2 border-dashed border-slate-200 rounded-2xl py-20 flex flex-col items-center justify-center bg-white/50 text-center">
                <h3 class="text-lg font-bold text-slate-700 mb-2">У цьому проєкті ще немає завдань.</h3>
                <p class="text-slate-500 text-sm">Створіть перше завдання за допомогою форми вище ☝️</p>
            </div>

        </div>
    </main>

        // Видалення проєкту
        window.deleteCurrentProject = function() {
            if(!activeProjectId) return;

                projects = projects.filter(p => p.id !== activeProjectId);
                tasks = tasks.filter(t => t.project_id !== activeProjectId);
                activeProjectId = projects.length > 0 ? projects[0].id : null;
                saveDb();
                renderProjects();
            }
        }

        // Рендер завдань поточного проєкту
        function updateMainView() {

            currentProjectTitle.innerText = activeProject.title;

            const projectTasks = tasks.filter(t => t.project_id === activeProjectId);
            
            // Прогрес
            const completedCount = projectTasks.filter(t => t.status === 'done').length;
            const progress = projectTasks.length === 0 ? 0 : Math.round((completedCount / projectTasks.length) * 100);

            progressText.innerText = `${progress}%`;
