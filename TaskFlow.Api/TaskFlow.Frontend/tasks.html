<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Мої завдання</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --txt: #f8fafc; --glass: rgba(15, 23, 42, 0.6); --brd: rgba(255, 255, 255, 0.05); }
        .light-theme { --bg: #f8fafc; --txt: #0f172a; --glass: rgba(255, 255, 255, 0.7); --brd: rgba(0, 0, 0, 0.05); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--txt); transition: 0.5s; }
        .glass { background: var(--glass); backdrop-filter: blur(16px); border: 1px solid var(--brd); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <nav class="fixed top-0 w-full z-50 glass border-b h-20">
        <div class="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="index.html" class="p-2 hover:bg-white/10 rounded-lg transition-colors text-slate-400 hover:text-white">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
                </a>
                <div class="text-2xl font-extrabold flex items-center gap-2">
                    <div class="w-9 h-9 bg-emerald-500 rounded-xl flex items-center justify-center text-white shadow-lg">✓</div>
                    TaskFlow
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button id="themeToggle" class="p-2.5 rounded-xl border border-white/10 glass">🌙</button>
                <button onclick="logout()" class="px-4 py-2 bg-rose-500/10 text-rose-500 rounded-xl font-bold hover:bg-rose-500/20 transition-all">Вихід</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow container mx-auto max-w-4xl p-6 mt-28">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
            <div class="p-6 rounded-[30px] glass bg-emerald-500/5 text-center">
                <p class="text-slate-400 text-xs font-bold uppercase">У роботі</p>
                <h3 id="activeCount" class="text-3xl font-black mt-1">0</h3>
            </div>
            <div class="p-6 rounded-[30px] glass text-center">
                <p class="text-slate-400 text-xs font-bold uppercase">Виконано</p>
                <h3 id="doneCount" class="text-3xl font-black mt-1 text-emerald-500">0</h3>
            </div>
            <div class="p-6 rounded-[30px] glass bg-indigo-500/5 text-center">
                <p class="text-slate-400 text-xs font-bold uppercase">Прогрес</p>
                <h3 id="progressPct" class="text-3xl font-black mt-1">0%</h3>
            </div>
        </div>

        <div class="glass p-4 rounded-[32px] mb-10 flex gap-3">
            <input type="text" id="taskInput" placeholder="Яке завдання на сьогодні?" class="flex-grow bg-transparent px-6 py-2 outline-none text-lg">
            <button onclick="addTask()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg shadow-emerald-500/20 transition-all active:scale-95">Додати</button>
        </div>

        <div id="taskList" class="space-y-4"></div>
    </main>

    <script>
        // ЗАХИСТ: якщо токена немає - геть звідси
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = 'login.html'; }

        const btn = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');
        btn.onclick = () => {
            const isL = document.body.classList.toggle('light-theme');
            localStorage.setItem('theme', isL ? 'light' : 'dark');
            btn.innerText = isL ? '☀️' : '🌙';
        };

        function logout() { localStorage.removeItem('token'); window.location.href = 'index.html'; }

        async function fetchTasks() {
            try {
                const res = await fetch('http://localhost:5143/api/tasks', { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) renderTasks(await res.json());
            } catch (err) { console.error("Помилка", err); }
        }

        async function addTask() {
            const title = document.getElementById('taskInput').value;
            if (!title) return;
            await fetch('http://localhost:5143/api/tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ title, isCompleted: false })
            });
            document.getElementById('taskInput').value = '';
            fetchTasks();
        }

        function renderTasks(tasks) {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            let done = 0;
            tasks.forEach(t => {
                if (t.isCompleted) done++;
                list.innerHTML += `
                    <div class="glass p-5 rounded-[24px] flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <button onclick="toggleTask(${t.id}, ${t.isCompleted})" class="w-7 h-7 rounded-full border-2 ${t.isCompleted ? 'bg-emerald-500 border-emerald-500' : 'border-white/20'}">✓</button>
                            <span class="${t.isCompleted ? 'line-through text-slate-500' : ''}">${t.title}</span>
                        </div>
                        <button onclick="deleteTask(${t.id})" class="text-rose-500 hover:scale-110 transition-transform">🗑</button>
                    </div>`;
            });
            document.getElementById('activeCount').innerText = tasks.length - done;
            document.getElementById('doneCount').innerText = done;
            document.getElementById('progressPct').innerText = tasks.length ? Math.round((done / tasks.length) * 100) + '%' : '0%';
        }

        fetchTasks();
    </script>
</body>
</html>
