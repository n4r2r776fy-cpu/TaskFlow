<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Вхід</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        h2 { margin-top: 0; color: #111827; font-weight: 700; margin-bottom: 25px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #d1d5db; border-radius: 8px; font-size: 15px; font-family: 'Inter', sans-serif; }
        input:focus { outline: none; border-color: #4f46e5; }
        button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #4338ca; }
        .error { color: #dc2626; font-size: 14px; display: none; margin-top: 15px; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>👋 З поверненням!</h2>
    <form id="loginForm">
        <input type="email" id="email" placeholder="Твій Email" required>
        <input type="password" id="password" placeholder="Пароль" required>
        <button type="submit">Увійти в акаунт</button>
    </form>
    <div id="errorMessage" class="error">Невірний email або пароль!</div>
    
    <div style="margin-top: 20px; font-size: 14px; color: #6b7280;">
        Немає акаунту? <a href="register.html" style="color: #4f46e5; text-decoration: none; font-weight: 500;">Зареєструватися</a>
    </div>
</div>

<script>
    // Порт 5143 з твого скріншоту!
    const API_URL = "https://localhost:5143/api/Auth/login"; 

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault(); 
        
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const errorDiv = document.getElementById("errorMessage");

        errorDiv.style.display = "none";

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: email, password: password })
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem("token", data.token);
                // Перекидаємо на сторінку завдань!
                window.location.href = "tasks.html"; 
            } else {
                errorDiv.style.display = "block";
            }
        } catch (error) {
            console.error(error);
            alert("Сервер не відповідає. Перевір, чи запущений бекенд!");
        }
    });
</script>

</body>
</html>
