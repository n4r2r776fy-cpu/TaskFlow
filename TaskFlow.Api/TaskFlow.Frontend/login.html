<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Вхід</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: #f8fafc;
        }
        
        /* Анімація для 3D об'єкта */
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        /* Ефект скляної картки */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-indigo-100 via-white to-emerald-50">

    <div class="w-full max-w-5xl grid md:grid-cols-2 shadow-[0_32px_64px_-15px_rgba(0,0,0,0.1)] rounded-[40px] overflow-hidden bg-white">
        
        <div class="p-12 lg:p-20 flex flex-col justify-center">
            <div class="mb-10">
                <a href="index.html" class="inline-flex items-center gap-2 text-indigo-600 font-bold mb-8 hover:opacity-80 transition">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    Назад
                </a>
                <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight mb-3">👋 З поверненням!</h1>
                <p class="text-slate-500">Введіть свої дані для доступу до TaskFlow</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700 ml-1">Email адреса</label>
                    <input type="email" id="email" required placeholder="name@mail.com" 
                           class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400">
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700 ml-1">Пароль</label>
                    <input type="password" id="password" required placeholder="••••••••" 
                           class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all">
                </div>

                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-xl shadow-indigo-200 transition-all active:scale-[0.98] mt-4">
                    Увійти в акаунт
                </button>
            </form>

            <p class="mt-10 text-center text-slate-500 text-sm">
                Ще немає акаунту? 
                <a href="register.html" class="text-indigo-600 font-bold hover:underline">Створити зараз</a>
            </p>
        </div>

        <div class="relative bg-indigo-600 hidden md:flex items-center justify-center p-12 overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-full opacity-20">
                <div class="absolute top-[-10%] right-[-10%] w-80 h-80 bg-white rounded-full blur-3xl"></div>
                <div class="absolute bottom-[-10%] left-[-10%] w-80 h-80 bg-emerald-400 rounded-full blur-3xl"></div>
            </div>

            <div class="relative z-10 text-center">
                <img src="https://cdn3d.iconscout.com/3d/premium/thumb/task-management-5168853-4323869.png" 
                     alt="Task 3D" 
                     class="w-full max-w-[380px] animate-float drop-shadow-[0_35px_35px_rgba(0,0,0,0.3)]">
                
                <div class="mt-8 text-white">
                    <h3 class="text-2xl font-bold mb-2">Продуктивність у 3D</h3>
                    <p class="text-indigo-100 text-sm opacity-80 max-w-[280px] mx-auto">
                        Керуйте своїми проектами за допомогою найсучаснішого інтерфейсу.
                    </p>
                </div>
            </div>
            
            <div class="absolute bottom-10 right-10 glass-card p-4 rounded-2xl shadow-2xl animate-float" style="animation-delay: -2s">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center text-white">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
                    </div>
                    <div>
                        <p class="text-[10px] uppercase tracking-wider text-slate-400 font-bold">Статус</p>
                        <p class="text-sm font-bold text-slate-800">Завдання виконано!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
