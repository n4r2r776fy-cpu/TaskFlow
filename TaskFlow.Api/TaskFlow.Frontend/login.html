<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід - TaskFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
       :root {
    --bg-color: #020617;
    --text-main: #f8fafc;
    /* Початковий колір - індиго */
    --accent: #4f46e5; 
    --glass-bg: rgba(15, 23, 42, 0.6);
    --border: rgba(255, 255, 255, 0.05);
}
:root {
        --accent: #4f46e5; /* Стандартний синій */
    }

    /* Цей клас ми будемо давати кнопкам */
    .bg-accent { 
        background-color: var(--accent) !important; 
    }
/* Створюємо клас, який буде використовувати нашу змінну */
.bg-accent { background-color: var(--accent) !important; }
.text-accent { color: var(--accent) !important; }
.border-accent { border-color: var(--accent) !important; }
.shadow-accent { shadow: 0 10px 15px -3px var(--accent); opacity: 0.3; }

        .light-theme {
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --border: rgba(0, 0, 0, 0.1);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: all 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: screen;
            overflow: hidden;
        }

        .bg-blob {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.4;
            animation: move 20s infinite alternate ease-in-out;
        }

        @keyframes move {
            0% { transform: translate(-10%, -10%) scale(1); }
            100% { transform: translate(20%, 20%) scale(1.2); }
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        input {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            transition: all 0.3s ease;
        }

        .light-theme input {
            background: rgba(0, 0, 0, 0.03) !important;
            border: 1px solid rgba(0, 0, 0, 0.1) !important;
            color: #0f172a !important;
        }

        input:focus {
            border-color: #4f46e5 !important;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            outline: none;
        }

        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(79, 70, 229, 0.4);
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="h-screen w-screen">

    <div class="bg-blob" style="top: -100px; left: -100px; background: radial-gradient(circle, #4338ca 0%, transparent 70%);"></div>
    <div class="bg-blob" style="bottom: -100px; right: -100px; background: radial-gradient(circle, #065f46 0%, transparent 70%);"></div>

    <div class="w-full max-w-md px-6 relative z-10">
        <div class="text-center mb-10">
            <a href="index.html" class="inline-flex items-center gap-3 text-3xl font-black tracking-tighter">
                <div class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-500/30">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3.5" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
                </div>
                TaskFlow
            </a>
        </div>

        <div class="glass-card p-10 rounded-[40px]">
            <h2 class="text-3xl font-extrabold mb-2 text-center">З поверненням!</h2>
            <p class="text-slate-400 text-center mb-10 font-medium">Введіть свої дані для входу</p>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold mb-2 ml-1 text-slate-300">Email адреса</label>
                    <input type="email" id="email" required placeholder="name@company.com" 
                        class="w-full px-6 py-4 rounded-2xl text-lg font-medium">
                </div>
                
                <div>
                    <label class="block text-sm font-bold mb-2 ml-1 text-slate-300">Пароль</label>
                    <input type="password" id="password" required placeholder="••••••••" 
                        class="w-full px-6 py-4 rounded-2xl text-lg font-medium">
                </div>

                <button type="submit" 
                    class="btn-glow w-full py-4 bg-indigo-600 text-white font-black rounded-2xl text-lg transition-all duration-300 mt-4">
                    Увійти в систему 
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-slate-400 font-medium">
                    Ще немає аккаунту? 
                    <a href="register.html" class="text-indigo-400 hover:text-indigo-300 font-bold ml-1 transition">Створити</a>
                </p>
            </div>
        </div>

        <div class="text-center mt-8">
            <a href="index.html" class="text-slate-500 hover:text-slate-300 text-sm font-bold transition flex items-center justify-center gap-2">
                ← На головну
            </a>
        </div>
    </div>

    <script>
        // Перевірка теми з localStorage
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-theme');
        }

        // ЛОГІКА ВХОДУ
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Створюємо об'єкт для сервера (UserLoginDto)
            const loginData = {
                Email: email,
                Password: password
            };

            try {
                // ПРИМІТКА: Коли напарник захостить сервак, заміни localhost на його URL
                const response = await fetch('http://localhost:5143/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(loginData)
                });

                const data = await response.json();

                if (response.ok) {
                    // ЗБЕРЕЖЕННЯ ТОКЕНА
                    localStorage.setItem('token', data.token);
                    
                    // Анімація успіху (опціонально)
                    alert("Вхід успішний! Вітаємо.");
                    
                    // Перенаправлення в кабінет
                    window.location.href = 'tasks.html';
                } else {
                    alert("Помилка: " + (data.message || "Невірний логін або пароль"));
                }
            } catch (err) {
                console.error(err);
                alert("Сервер не відповідає. Перевірте статус сервера (Offline/Online).");
            }
        };
    </script>
</body>
</html>
