<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація - TaskFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #020617; --text-main: #f8fafc; --glass-bg: rgba(15, 23, 42, 0.6); --border: rgba(255, 255, 255, 0.05); }
        .light-theme { --bg-color: #f4f4f2; --text-main: #1c1c1e; --glass-bg: rgba(255, 255, 255, 0.4); --border: rgba(0, 0, 0, 0.08); }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); transition: all 0.5s ease; }
        .bg-grid { position: fixed; inset: 0; background-image: radial-gradient(var(--border) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; opacity: 0.4; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--border); }
        .input-glass { background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: inherit; }
        .light-theme .input-glass { background: rgba(255,255,255,0.5); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
    <div class="bg-grid"></div>

    <a href="index.html" class="absolute top-8 left-8 flex items-center gap-2 font-bold hover:text-indigo-500 transition opacity-50 hover:opacity-100">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg> На головну
    </a>

    <div class="glass p-10 rounded-[32px] w-full max-w-md shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black tracking-tight">Новий акаунт</h1>
            <p class="text-sm text-slate-400 mt-2">Приєднуйся до TaskFlow</p>
        </div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase opacity-50 mb-2 ml-1">Ім'я</label>
                <input type="text" required class="w-full px-5 py-4 rounded-2xl input-glass focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition" placeholder="Як до вас звертатися?">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase opacity-50 mb-2 ml-1">Email</label>
                <input type="email" required class="w-full px-5 py-4 rounded-2xl input-glass focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition" placeholder="name@example.com">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase opacity-50 mb-2 ml-1">Пароль</label>
                <input type="password" required class="w-full px-5 py-4 rounded-2xl input-glass focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition" placeholder="Мінімум 8 символів">
            </div>
            <button type="submit" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-700 transition shadow-lg shadow-indigo-500/20 mt-4">
                Зареєструватися
            </button>
        </form>

        <p class="text-center text-sm mt-8 opacity-60">
            Вже є акаунт? <a href="login.html" class="font-bold text-indigo-500 hover:text-indigo-400">Увійти</a>
        </p>
    </div>

<script>
        // Перевірка теми
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-theme');
        }

        const registerForm = document.getElementById('registerForm');
        
        registerForm.addEventListener('submit', function(e) {
            e.preventDefault(); // Жорстко зупиняємо перезавантаження сторінки
            
            // Записуємо токен після реєстрації
            localStorage.setItem('token', 'fake-jwt-token-123');
            
            // Перекидаємо в кабінет
            window.location.replace('tasks.html'); 
        });
    </script>
</body>
</html>
