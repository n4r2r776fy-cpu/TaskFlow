<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Реєстрація</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        h2 { margin-top: 0; color: #111827; font-weight: 700; margin-bottom: 10px; }
        p.subtitle { color: #6b7280; font-size: 14px; margin-bottom: 25px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #d1d5db; border-radius: 8px; font-size: 15px; font-family: 'Inter', sans-serif; box-sizing: border-box;}
        input:focus { outline: none; border-color: #10b981; }
        button { width: 100%; padding: 12px; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #059669; }
        .links { margin-top: 20px; font-size: 14px; }
        .links a { color: #4f46e5; text-decoration: none; font-weight: 500; }
        .links a:hover { text-decoration: underline; }
        .message { font-size: 14px; display: none; margin-top: 15px; padding: 10px; border-radius: 8px; }
        .error { background: #fee2e2; color: #dc2626; }
        .success { background: #d1fae5; color: #059669; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Створити акаунт 🚀</h2>
    <p class="subtitle">Приєднуйся до TaskFlow сьогодні</p>
    
    <form id="registerForm">
        <input type="email" id="email" placeholder="Твій Email" required>
        <input type="password" id="password" placeholder="Пароль (мінімум 6 символів, 1 велика літера, 1 цифра)" required title="Пароль повинен містити велику літеру, цифру та спецсимвол (наприклад !@#)">
        <button type="submit">Зареєструватися</button>
    </form>
    
    <div id="statusMessage" class="message"></div>

    <div class="links">
        Вже маєш акаунт? <a href="login.html">Увійти</a>
    </div>
</div>

<script>
    // ⚠️ Порт 5143 для реєстрації
    const API_URL = "https://localhost:5143/api/Auth/register"; 

    document.getElementById("registerForm").addEventListener("submit", async (e) => {
        e.preventDefault(); 
        
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const msgDiv = document.getElementById("statusMessage");

        msgDiv.style.display = "none";
        msgDiv.className = "message"; // Скидаємо класи

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: email, password: password })
            });

            if (response.ok) {
                msgDiv.textContent = "Реєстрація успішна! Перенаправляємо на вхід...";
                msgDiv.classList.add("success");
                msgDiv.style.display = "block";
                
                // Через 2 секунди перекидаємо на сторінку логіну
                setTimeout(() => {
                    window.location.href = "login.html";
                }, 2000);
            } else {
                msgDiv.textContent = "Помилка реєстрації. Можливо, такий email вже існує, або пароль занадто простий.";
                msgDiv.classList.add("error");
                msgDiv.style.display = "block";
            }
        } catch (error) {
            console.error(error);
            msgDiv.textContent = "Помилка з'єднання з сервером.";
            msgDiv.classList.add("error");
            msgDiv.style.display = "block";
        }
    });
</script>

</body>
</html>
