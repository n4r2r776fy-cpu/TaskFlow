<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація - TaskFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --text-main: #f8fafc;
            --glass-bg: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        .light-theme {
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --border: rgba(0, 0, 0, 0.1);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: all 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-blob {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            z-index: -1;
            filter: blur(90px);
            opacity: 0.35;
            animation: move 25s infinite alternate ease-in-out;
        }

        @keyframes move {
            0% { transform: translate(-20%, -10%) scale(1); }
            100% { transform: translate(30%, 20%) scale(1.3); }
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }

        input {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            transition: all 0.3s ease;
        }

        .light-theme input {
            background: rgba(0, 0, 0, 0.03) !important;
            border: 1px solid rgba(0, 0, 0, 0.1) !important;
            color: #0f172a !important;
        }

        input:focus {
            border-color: #10b981 !important;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
            outline: none;
        }

        .btn-reg {
            background: linear-gradient(135deg, #4f46e5, #10b981);
            transition: all 0.3s ease;
        }

        .btn-reg:hover {
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.4);
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
    </style>
</head>
<body class="py-12">

    <div class="bg-blob" style="top: -150px; right: -100px; background: radial-gradient(circle, #312e81 0%, transparent 70%);"></div>
    <div class="bg-blob" style="bottom: -150px; left: -100px; background: radial-gradient(circle, #064e3b 0%, transparent 70%);"></div>

    <div class="w-full max-w-md px-6 relative z-10">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-3 text-3xl font-black tracking-tighter">
                <div class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3.5" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
                </div>
                TaskFlow
            </a>
        </div>

        <div class="glass-card p-10 rounded-[40px]">
            <h2 class="text-3xl font-extrabold mb-2 text-center">Реєстрація акаунту</h2>
            <p class="text-slate-400 text-center mb-8 font-medium text-sm">Створення нового профілю користувача</p>

            <form id="registerForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold mb-2 ml-1 uppercase tracking-wider text-slate-500">Ім'я користувача</label>
                    <input type="text" id="username" required placeholder="Нікнейм" 
                        class="w-full px-6 py-4 rounded-2xl text-base font-medium">
                </div>

                <div>
                    <label class="block text-xs font-bold mb-2 ml-1 uppercase tracking-wider text-slate-500">Email адреса</label>
                    <input type="email" id="email" required placeholder="example@mail.com" 
                        class="w-full px-6 py-4 rounded-2xl text-base font-medium">
                </div>
                
                <div>
                    <label class="block text-xs font-bold mb-2 ml-1 uppercase tracking-wider text-slate-500">Пароль</label>
                    <input type="password" id="password" required placeholder="Мінімум 6 символів" 
                        class="w-full px-6 py-4 rounded-2xl text-base font-medium">
                </div>

                <button type="submit" 
                    class="btn-reg w-full py-4 text-white font-black rounded-2xl text-lg mt-4 shadow-xl shadow-indigo-500/20">
                    Зареєструватися
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-slate-400 font-medium text-sm">
                    Вже зареєстровані? 
                    <a href="login.html" class="text-emerald-400 hover:text-emerald-300 font-bold ml-1 transition">Увійти</a>
                </p>
            </div>
        </div>

        <div class="text-center mt-8">
            <a href="index.html" class="text-slate-500 hover:text-slate-300 text-xs font-bold transition">
                Повернутися на головну сторінку
            </a>
        </div>
    </div>

    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-theme');
        }

        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const userData = {
                Username: document.getElementById('username').value,
                Email: document.getElementById('email').value,
                Password: document.getElementById('password').value
            };

            try {
                const response = await fetch('http://localhost:5143/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                if (response.ok) {
                    window.location.href = 'login.html';
                } else {
                    const errorMsg = await response.text();
                    console.error("Помилка реєстрації: " + errorMsg);
                }
            } catch (err) {
                console.error("Помилка підключення до сервера");
            }
        };
    </script>
</body>
</html>
