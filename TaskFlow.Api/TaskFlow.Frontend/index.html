<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Вхід</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        h2 { margin-top: 0; color: #333; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .error { color: #dc3545; font-size: 14px; display: none; margin-top: 15px; }
        .success { color: #28a745; font-size: 14px; display: none; margin-top: 15px; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Вхід у TaskFlow</h2>
    <form id="loginForm">
        <input type="email" id="email" placeholder="Твій Email" required>
        <input type="password" id="password" placeholder="Пароль" required>
        <button type="submit">Увійти</button>
    </form>
    <div id="errorMessage" class="error">Невірний email або пароль!</div>
    <div id="successMessage" class="success">Успішний вхід! Токен збережено.</div>
</div>

<script>
    // ⚠️ ВАЖЛИВО: Заміни "ПОРТ" на той, на якому працює твій бекенд!
    // Подивись у термінал, де запущено сервер. Там буде щось типу "Now listening on: https://localhost:7123"
    const API_URL = "https://localhost:5143/api/Auth/login"; 

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault(); // Зупиняємо стандартне перезавантаження сторінки
        
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const errorDiv = document.getElementById("errorMessage");
        const successDiv = document.getElementById("successMessage");

        errorDiv.style.display = "none";
        successDiv.style.display = "none";

        try {
            // Відправляємо дані на наш бекенд
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: email, password: password })
            });

            if (response.ok) {
                const data = await response.json();
                
                // Найголовніша магія: зберігаємо токен у пам'ять браузера (localStorage)
                localStorage.setItem("token", data.token);
                
                successDiv.style.display = "block";
                
                // Пізніше ми тут додамо код, який перекине нас на сторінку із завданнями:
                // setTimeout(() => { window.location.href = "tasks.html"; }, 1500);
            } else {
                errorDiv.style.display = "block";
            }
        } catch (error) {
            console.error("Помилка:", error);
            alert("Сервер не відповідає. Перевір, чи запущений бекенд і чи правильно вказано порт!");
        }
    });
</script>

</body>
</html>
