<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Вхід</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: #f8fafc;
        }
        
        /* Анімація плавного плавання для 3D об'єкта */
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(5deg); }
        }
        .animate-3d-login {
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-slate-50">

    <div class="w-full max-w-5xl grid md:grid-cols-2 shadow-[0_32px_80px_-15px_rgba(0,0,0,0.15)] rounded-[40px] overflow-hidden bg-white">
        
        <div class="p-12 lg:p-20 flex flex-col justify-center relative">
            <div class="mb-8">
                <a href="index.html" class="inline-flex items-center gap-2.5 text-indigo-600 font-bold mb-8 hover:opacity-80 transition group">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="transition-transform group-hover:-translate-x-1"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    Назад
                </a>
                <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight mb-3">З поверненням! </h1>
                <p class="text-slate-500 font-medium">Введіть свої дані, щоб увійти в систему TaskFlow.</p>
            </div>

            <form id="loginForm" class="space-y-4">
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">Email адреса</label>
                    <input type="email" id="email" required placeholder="gupaliuk.roma@gmail.com" 
                           class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400">
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">Пароль</label>
                    <input type="password" id="password" required placeholder="••••••••" 
                           class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all">
                </div>

                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-4 rounded-2xl shadow-xl shadow-indigo-100 transition-all active:scale-[0.97] mt-4">
                    Увійти в акаунт
                </button>
            </form>

            <p class="mt-10 text-center text-slate-500 text-sm font-medium">
                Ще немає акаунту? 
                <a href="register.html" class="text-indigo-600 font-bold hover:underline">Реєстрація</a>
            </p>
        </div>

        <div class="relative bg-slate-950 hidden md:flex items-center justify-center p-12 overflow-hidden">
            <div class="absolute top-[-20%] right-[-20%] w-[500px] h-[500px] bg-indigo-600/30 rounded-full blur-[120px]"></div>
            <div class="absolute bottom-[-10%] left-[-10%] w-[300px] h-[300px] bg-violet-500/20 rounded-full blur-[100px]"></div>

            <div class="relative z-10 text-center">
                <img src="https://cdn3d.iconscout.com/3d/premium/thumb/key-5682855-4731215.png" 
                     alt="Login 3D" 
                     class="w-full max-w-[350px] animate-3d-login drop-shadow-[0_45px_45px_rgba(79,70,229,0.4)]">
                
                <div class="w-32 h-6 bg-black/40 rounded-[100%] blur-2xl mt-8 mx-auto opacity-50"></div>
            </div>
        </div>

    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(event) {
            event.preventDefault(); 

            const emailValue = document.getElementById('email').value;
            const passwordValue = document.getElementById('password').value;
            
            try {
                // Відправляємо запит на логін (з твоїм портом 5143)
                const response = await fetch('http://localhost:5143/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: emailValue,
                        password: passwordValue
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    // Зберігаємо токен
                    localStorage.setItem('jwtToken', data.token);
                    
                    alert('Вхід успішний!');
                    
                    // Переходимо на сторінку із завданнями
                    window.location.href = 'tasks.html'; 
                } else {
                    const errorData = await response.text();
                    alert('Помилка входу: ' + (errorData || 'Невірний email або пароль'));
                }
            } catch (error) {
                console.error('Помилка:', error);
                alert('Не вдалося з\'єднатися з сервером. Переконайся, що сервер працює.');
            }
        });
    </script>
</body>
</html>
