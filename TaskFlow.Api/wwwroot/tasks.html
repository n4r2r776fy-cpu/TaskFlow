<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мої проєкти - TaskFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --text-main: #f8fafc;
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-panel: rgba(30, 41, 59, 0.5);
            --border: rgba(255, 255, 255, 0.08);
        }

        .light-theme {
            --bg-color: #f4f4f2;
            --text-main: #1c1c1e;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-panel: rgba(255, 255, 255, 0.9);
            --border: rgba(0, 0, 0, 0.08);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            overflow: hidden; 
            transition: all 0.3s ease;
        }

        .bg-grid { 
            position: fixed; inset: 0; 
            background-image: radial-gradient(var(--border) 1px, transparent 1px); 
            background-size: 40px 40px; 
            z-index: -1; opacity: 0.5; 
        }

        .glass { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-right: 1px solid var(--border); }
        .glass-panel { background: var(--glass-panel); backdrop-filter: blur(12px); border: 1px solid var(--border); }
        .glass-input { background: rgba(0,0,0,0.1); border: 1px solid var(--border); color: inherit; }
        .light-theme .glass-input { background: rgba(255,255,255,0.6); }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .task-checkbox {
            appearance: none;
            -webkit-appearance: none;
            background-color: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.2);
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .light-theme .task-checkbox {
            background-color: rgba(0, 0, 0, 0.05);
            border: 2px solid rgba(0, 0, 0, 0.2);
        }
        .task-checkbox:checked {
            background-color: #4f46e5;
            border-color: #4f46e5;
        }
        .task-checkbox:checked::after {
            content: '';
            position: absolute;
            left: 32%;
            top: 15%;
            width: 30%;
            height: 60%;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
        
        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.6;
            cursor: pointer;
        }
        .light-theme ::-webkit-calendar-picker-indicator {
            filter: invert(0);
        }

        select option {
            background-color: var(--bg-color);
            color: var(--text-main);
        }
    </style>
</head>
<body class="flex h-screen">

    <div class="bg-grid"></div>

    <script>
        if (localStorage.getItem('theme') === 'light') { document.body.classList.add('light-theme'); }
    </script>

    <aside class="w-72 glass flex flex-col h-full shadow-2xl z-20 relative">
        <div class="h-20 flex items-center px-6 border-b border-white/5">
            <a href="index.html" class="text-xl font-black flex items-center gap-3 tracking-tight hover:opacity-80 transition">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/30">
                    <svg width="18" height="18" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
                </div>
                TaskFlow
            </a>
        </div>

        <div class="flex-1 overflow-y-auto py-6 flex flex-col custom-scrollbar">
            <div class="px-6 flex items-center justify-between mb-2">
                <span class="text-xs font-bold uppercase tracking-widest opacity-40">Навігація</span>
            </div>
            <ul class="space-y-1 px-4 mb-6">
                <li>
                    <button onclick="selectProject('all')" id="btn-proj-all" class="w-full text-left px-4 py-2.5 rounded-xl flex items-center gap-3 transition font-bold text-sm opacity-60 hover:opacity-100 hover:bg-white/5">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
                        Усі завдання
                    </button>
                </li>
                <li>
                    <button onclick="selectProject('none')" id="btn-proj-none" class="w-full text-left px-4 py-2.5 rounded-xl flex items-center gap-3 transition font-bold text-sm opacity-60 hover:opacity-100 hover:bg-white/5">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg>
                        Без проєкту
                    </button>
                </li>
            </ul>

            <div class="px-6 flex items-center justify-between mb-2">
                <span class="text-xs font-bold uppercase tracking-widest opacity-40">Твої проєкти</span>
            </div>
            
            <ul id="projectList" class="space-y-1 px-4 mb-6"></ul>

            <form id="projectForm" class="px-4 mt-auto">
                <div class="flex gap-2">
                    <input type="text" id="newProjectInput" required placeholder="Новий проєкт..." class="flex-1 glass-input rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition">
                    <button type="submit" class="w-10 h-10 bg-indigo-600 hover:bg-indigo-700 rounded-xl flex items-center justify-center text-white transition shadow-lg shrink-0">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                    </button>
                </div>
            </form>
        </div>

        <div class="p-4 border-t border-white/5 space-y-2">
            <button onclick="logout()" class="flex items-center gap-3 w-full px-4 py-3 rounded-xl text-sm font-bold opacity-70 hover:opacity-100 hover:bg-white/5 transition">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                Вийти з акаунта
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative z-10">
        
        <header class="border-b border-white/5 px-8 py-6 flex flex-col gap-4 backdrop-blur-md bg-transparent shrink-0">
            <div class="flex items-center justify-between">
                <div>
                    <h1 id="currentProjectTitle" class="text-3xl font-black tracking-tight mb-1">Усі завдання</h1>
                    <p class="text-sm opacity-60">Статистика по всіх ваших завданнях</p>
                </div>
                <button id="deleteProjectBtn" onclick="deleteCurrentProject()" class="hidden text-xs font-bold px-4 py-2 rounded-xl text-rose-500 hover:bg-rose-500/10 transition border border-transparent hover:border-rose-500/20 items-center gap-2">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    Видалити проєкт
                </button>
            </div>

            <div class="grid grid-cols-4 gap-4 mt-2 max-w-4xl">
                <div class="glass-panel rounded-xl p-4 border border-white/5">
                    <p class="text-[10px] font-bold uppercase tracking-wider opacity-50 mb-1">Всього завдань</p>
                    <p id="statTotal" class="text-2xl font-black">0</p>
                </div>
                <div class="glass-panel rounded-xl p-4 border border-white/5">
                    <p class="text-[10px] font-bold uppercase tracking-wider opacity-50 mb-1">Виконано</p>
                    <p id="statDone" class="text-2xl font-black text-emerald-400">0</p>
                </div>
                <div class="glass-panel rounded-xl p-4 border border-white/5">
                    <p class="text-[10px] font-bold uppercase tracking-wider opacity-50 mb-1">Прострочено</p>
                    <p id="statOverdue" class="text-2xl font-black text-rose-500">0</p>
                </div>
                <div class="glass-panel rounded-xl p-4 border border-white/5">
                    <p class="text-[10px] font-bold uppercase tracking-wider opacity-50 mb-1">Витрачено часу</p>
                    <p id="statTime" class="text-2xl font-black text-indigo-400">0г 0хв</p>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 custom-scrollbar">
            
            <form id="taskForm" class="glass-panel p-2 rounded-2xl shadow-xl flex flex-col gap-2 mb-6 border border-white/10 max-w-5xl">
                <div class="flex flex-col md:flex-row items-center gap-2 w-full">
                    <input type="text" id="taskTitle" required placeholder="Що потрібно зробити?" class="flex-1 px-4 py-3 bg-transparent focus:outline-none text-sm font-bold w-full">
                    <div class="hidden md:block w-px h-8 bg-white/10"></div>
                    <input type="text" id="taskDesc" placeholder="Деталі (необов'язково)..." class="w-full md:w-1/3 px-4 py-3 bg-transparent opacity-70 focus:opacity-100 focus:outline-none text-sm">
                </div>
                <div class="flex flex-col md:flex-row items-center gap-2 border-t border-white/5 pt-2 px-2 pb-1">
                    <select id="taskPriority" class="w-full md:w-auto px-4 py-2 bg-black/20 rounded-xl opacity-70 focus:opacity-100 focus:outline-none text-sm cursor-pointer border border-transparent">
                        <option value="low">Низький пріоритет</option>
                        <option value="medium" selected>Середній пріоритет</option>
                        <option value="high">Високий пріоритет</option>
                    </select>
                    <input type="datetime-local" id="taskDate" class="w-full md:w-auto px-4 py-2 bg-black/20 rounded-xl opacity-70 focus:opacity-100 focus:outline-none text-sm cursor-pointer border border-transparent">
                    <button type="submit" class="w-full md:w-auto ml-auto px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm rounded-xl transition shadow-lg shadow-indigo-500/20 whitespace-nowrap">
                        Додати завдання
                    </button>
                </div>
            </form>

            <div class="max-w-5xl flex flex-col md:flex-row gap-3 mb-6 items-center bg-black/10 p-3 rounded-2xl border border-white/5">
                <div class="relative flex-1 w-full">
                    <svg class="absolute left-3 top-2.5 opacity-50" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35"/></svg>
                    <input type="text" id="searchTask" placeholder="Пошук за назвою..." class="w-full pl-9 pr-4 py-2 glass-input rounded-xl text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500 transition">
                </div>
                <select id="filterStatus" class="w-full md:w-40 px-3 py-2 glass-input rounded-xl text-sm cursor-pointer">
                    <option value="all">Всі статуси</option>
                    <option value="todo">До виконання</option>
                    <option value="in_progress">У процесі</option>
                    <option value="done">Виконано</option>
                    <option value="closed">Закрито</option>
                </select>
                <select id="filterPriority" class="w-full md:w-40 px-3 py-2 glass-input rounded-xl text-sm cursor-pointer">
                    <option value="all">Всі пріоритети</option>
                    <option value="high">Високий</option>
                    <option value="medium">Середній</option>
                    <option value="low">Низький</option>
                </select>
            </div>

            <div id="tasksContainer" class="space-y-4 max-w-5xl"></div>

            <div id="emptyState" class="hidden border-2 border-dashed border-white/10 rounded-[32px] py-24 flex flex-col items-center justify-center text-center opacity-70 max-w-5xl">
                <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center mb-4 text-indigo-400">
                    <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
                </div>
                <h3 class="text-xl font-black mb-2">Завдань не знайдено</h3>
                <p class="text-sm opacity-60 max-w-sm">За вашим запитом або у цьому проєкті немає завдань.</p>
            </div>
        </div>
    </main>

    <script>
        // --- ІНІЦІАЛІЗАЦІЯ ДАНИХ ТА МІГРАЦІЯ ---
        let projects = JSON.parse(localStorage.getItem('projects')) || [];
        let rawTasks = JSON.parse(localStorage.getItem('tasks')) || [];
        
        let tasks = rawTasks.map(t => ({
            ...t,
            priority: t.priority || 'medium',
            status: t.status === true ? 'done' : (t.status || 'todo'),
            timeLogs: t.timeLogs || [],
            completed_at: t.completed_at || null
        }));

        let activeProjectId = 'all'; 

        const projectList = document.getElementById('projectList');
        const projectForm = document.getElementById('projectForm');
        const newProjectInput = document.getElementById('newProjectInput');
        
        const currentProjectTitle = document.getElementById('currentProjectTitle');
        const deleteProjectBtn = document.getElementById('deleteProjectBtn');
        
        const statTotal = document.getElementById('statTotal');
        const statDone = document.getElementById('statDone');
        const statOverdue = document.getElementById('statOverdue');
        const statTime = document.getElementById('statTime');
        
        const taskForm = document.getElementById('taskForm');
        const tasksContainer = document.getElementById('tasksContainer');
        const emptyState = document.getElementById('emptyState');

        const searchInput = document.getElementById('searchTask');
        const filterStatus = document.getElementById('filterStatus');
        const filterPriority = document.getElementById('filterPriority');

        searchInput.addEventListener('input', updateMainView);
        filterStatus.addEventListener('change', updateMainView);
        filterPriority.addEventListener('change', updateMainView);

        function saveDb() {
            localStorage.setItem('projects', JSON.stringify(projects));
            localStorage.setItem('tasks', JSON.stringify(tasks));
            updateGlobalStats();
        }

        // --- ДОПОМІЖНІ ФУНКЦІЇ ЧАСУ ---
        function formatMinutes(totalMins) {
            if (!totalMins) return '0хв';
            const h = Math.floor(totalMins / 60);
            const m = totalMins % 60;
            if (h > 0 && m > 0) return `${h}г ${m}хв`;
            if (h > 0) return `${h}г`;
            return `${m}хв`;
        }

        function calculateTaskTime(task) {
            return task.timeLogs.reduce((acc, log) => acc + (parseInt(log.minutes) || 0), 0);
        }

        // --- СТАТИСТИКА ПРОДУКТИВНОСТІ ---
        function updateGlobalStats() {
            const total = tasks.length;
            const done = tasks.filter(t => t.status === 'done').length;
            
            const now = new Date().getTime();
            const overdue = tasks.filter(t => {
                if (t.status === 'done' || t.status === 'closed' || !t.due_date) return false;
                return new Date(t.due_date).getTime() < now;
            }).length;

            const totalMins = tasks.reduce((acc, t) => acc + calculateTaskTime(t), 0);

            statTotal.innerText = total;
            statDone.innerText = done;
            statOverdue.innerText = overdue;
            statTime.innerText = formatMinutes(totalMins);
        }

        // --- РЕНДЕР БОКОВОЇ ПАНЕЛІ ---
        function renderProjects() {
            projectList.innerHTML = '';
            
            document.getElementById('btn-proj-all').className = `w-full text-left px-4 py-2.5 rounded-xl flex items-center gap-3 transition font-bold text-sm ${activeProjectId === 'all' ? 'bg-indigo-600 text-white shadow-lg' : 'opacity-60 hover:opacity-100 hover:bg-white/5'}`;
            document.getElementById('btn-proj-none').className = `w-full text-left px-4 py-2.5 rounded-xl flex items-center gap-3 transition font-bold text-sm ${activeProjectId === 'none' ? 'bg-indigo-600 text-white shadow-lg' : 'opacity-60 hover:opacity-100 hover:bg-white/5'}`;

            projects.forEach(p => {
                const isActive = p.id === activeProjectId;
                const li = document.createElement('li');
                li.innerHTML = `
                    <button onclick="selectProject(${p.id})" class="w-full text-left px-4 py-2.5 rounded-xl flex items-center gap-3 transition font-bold text-sm ${isActive ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/20' : 'opacity-60 hover:opacity-100 hover:bg-white/5'}">
                        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
                        <span class="truncate">${p.title}</span>
                    </button>
                `;
                projectList.appendChild(li);
            });
        }

        window.selectProject = function(id) {
            activeProjectId = id;
            renderProjects();
            updateMainView();
        }

        projectForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const title = newProjectInput.value.trim();
            if (title) {
                const newId = Date.now();
                projects.push({ id: newId, title: title });
                activeProjectId = newId;
                newProjectInput.value = '';
                saveDb();
                renderProjects();
                updateMainView();
            }
        });

        window.deleteCurrentProject = function() {
            if(activeProjectId === 'all' || activeProjectId === 'none') return;
            if(confirm('Ви точно хочете видалити цей проєкт і всі його завдання?')) {
                projects = projects.filter(p => p.id !== activeProjectId);
                tasks = tasks.filter(t => t.project_id !== activeProjectId);
                activeProjectId = 'all';
                saveDb();
                renderProjects();
                updateMainView();
            }
        }

        // --- РЕНДЕР ОСНОВНОЇ ПАНЕЛІ ---
        function updateMainView() {
            if (activeProjectId === 'all') {
                currentProjectTitle.innerText = "Усі завдання";
                deleteProjectBtn.classList.add('hidden');
                deleteProjectBtn.classList.remove('flex');
            } else if (activeProjectId === 'none') {
                currentProjectTitle.innerText = "Без проєкту";
                deleteProjectBtn.classList.add('hidden');
                deleteProjectBtn.classList.remove('flex');
            } else {
                const p = projects.find(p => p.id === activeProjectId);
                if (p) currentProjectTitle.innerText = p.title;
                deleteProjectBtn.classList.remove('hidden');
                deleteProjectBtn.classList.add('flex');
            }

            const q = searchInput.value.toLowerCase();
            const fStatus = filterStatus.value;
            const fPriority = filterPriority.value;

            let filteredTasks = tasks.filter(t => {
                if (activeProjectId === 'none' && t.project_id !== null) return false;
                if (activeProjectId !== 'all' && activeProjectId !== 'none' && t.project_id !== activeProjectId) return false;
                if (q && !t.title.toLowerCase().includes(q)) return false;
                if (fStatus !== 'all' && t.status !== fStatus) return false;
                if (fPriority !== 'all' && t.priority !== fPriority) return false;
                return true;
            });

            filteredTasks.sort((a, b) => {
                if (!a.due_date && !b.due_date) return 0;
                if (!a.due_date) return 1;
                if (!b.due_date) return -1;
                return new Date(a.due_date) - new Date(b.due_date);
            });

            tasksContainer.innerHTML = '';
            
            if (filteredTasks.length === 0) {
                emptyState.style.display = 'flex';
            } else {
                emptyState.style.display = 'none';
                
                filteredTasks.forEach(t => {
                    const isDone = t.status === 'done';
                    const isClosed = t.status === 'closed';
                    
                    // ДОДАНО ПЕРЕВІРКУ НА ПРОСТРОЧЕНІСТЬ
                    const now = new Date().getTime();
                    const isOverdue = t.due_date && new Date(t.due_date).getTime() < now && !isDone;
                    
                    let prioColor = 'text-gray-400 border-gray-400/20 bg-gray-400/10';
                    let prioText = 'Невідомо';
                    if(t.priority === 'high') { prioColor = 'text-rose-400 border-rose-400/20 bg-rose-400/10'; prioText = 'Високий'; }
                    if(t.priority === 'medium') { prioColor = 'text-amber-400 border-amber-400/20 bg-amber-400/10'; prioText = 'Середній'; }
                    if(t.priority === 'low') { prioColor = 'text-emerald-400 border-emerald-400/20 bg-emerald-400/10'; prioText = 'Низький'; }

                    let timerHtml = '';
                    if (isDone) {
                        const compDate = t.completed_at ? new Date(t.completed_at).toLocaleDateString('uk-UA', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '';
                        timerHtml = `<span class="text-emerald-400 text-[11px] font-bold flex flex-col items-end gap-0.5">
                            <span class="flex items-center gap-1"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg> Виконано</span>
                            ${compDate ? `<span class="opacity-60 font-normal text-[9px]">${compDate}</span>` : ''}
                        </span>`;
                    } else if (isClosed || isOverdue) {
                        timerHtml = `<span class="text-rose-500 text-[11px] font-bold flex items-center gap-1">🔒 Прострочено</span>`;
                    } else if (t.due_date) {
                        timerHtml = `<span class="countdown-timer text-amber-400 text-xs font-bold font-mono bg-amber-400/10 px-3 py-1.5 rounded-xl border border-amber-400/20 flex items-center gap-1.5" data-due="${t.due_date}">⏳ Рахуємо...</span>`;
                    }

                    const totalMins = calculateTaskTime(t);
                    const timeString = formatMinutes(totalMins);

                    const taskEl = document.createElement('div');
                    taskEl.className = `glass-panel p-5 rounded-2xl flex flex-col gap-3 transition duration-300 border border-white/5 group ${(isDone || isClosed || isOverdue) ? 'opacity-60 bg-black/20' : 'shadow-lg'}`;
                    
                    // ДОДАНО БЛОКУВАННЯ ВИПАДАЮЧОГО СПИСКУ (disabled атрибут і класи)
                    taskEl.innerHTML = `
                        <div class="flex items-start gap-4">
                            <div class="flex-shrink-0 pt-1">
                                <select onchange="changeTaskStatus(${t.id}, this.value)" ${(isOverdue || isClosed) ? 'disabled title="Завдання прострочене"' : ''} class="text-xs font-bold bg-transparent border border-white/20 rounded-lg px-2 py-1 focus:outline-none ${(isOverdue || isClosed) ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'} ${isDone ? 'text-emerald-400 border-emerald-400/50' : ((isClosed || isOverdue) ? 'text-rose-500 border-rose-500/50' : (t.status === 'in_progress' ? 'text-indigo-400 border-indigo-400/50' : ''))}">
                                    <option value="todo" ${t.status === 'todo' && !isOverdue && !isClosed ? 'selected' : ''}>⏳ До виконання</option>
                                    <option value="in_progress" ${t.status === 'in_progress' && !isOverdue && !isClosed ? 'selected' : ''}>🔥 В процесі</option>
                                    <option value="done" ${t.status === 'done' ? 'selected' : ''}>✅ Виконано</option>
                                    <option value="closed" ${(isClosed || isOverdue) && t.status !== 'done' ? 'selected' : ''} ${!(isClosed || isOverdue) ? 'disabled hidden' : ''}>🔒 Прострочено</option>
                                </select>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 mb-1">
                                    <h4 class="font-bold text-base truncate ${(isDone || isClosed || isOverdue) ? 'line-through opacity-70' : ''}">${t.title}</h4>
                                    <span class="text-[10px] px-2 py-0.5 rounded-full border ${prioColor}">${prioText}</span>
                                </div>
                                ${t.description ? `<p class="text-xs opacity-70 truncate ${(isDone || isClosed || isOverdue) ? 'line-through' : ''}">${t.description}</p>` : ''}
                            </div>
                            
                            <div class="hidden sm:flex flex-col items-end gap-2">
                                ${timerHtml}
                            </div>

                            <button onclick="deleteTask(${t.id})" class="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded-xl text-rose-500 hover:bg-rose-500/20 transition opacity-0 group-hover:opacity-100 sm:opacity-100">
                                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                            </button>
                        </div>
                        
                        <div class="bg-black/10 rounded-xl p-3 border border-white/5 flex flex-col gap-2 mt-2">
                            <div class="flex items-center justify-between">
                                <span class="text-xs font-bold opacity-60 flex items-center gap-1">
                                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                    Витрачено часу: <span class="text-indigo-400 ml-1">${timeString}</span>
                                </span>
                                <button onclick="toggleTimeForm(${t.id})" class="text-[11px] font-bold bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded-lg transition">
                                    + Додати лог
                                </button>
                            </div>
                            
                            <div id="timeform-${t.id}" class="hidden flex gap-2 items-center mt-2 border-t border-white/5 pt-2">
                                <input type="number" id="time-mins-${t.id}" placeholder="Хв" class="w-16 text-xs glass-input px-3 py-2 rounded-lg focus:outline-none">
                                <input type="text" id="time-desc-${t.id}" placeholder="Коментар..." class="flex-1 text-xs glass-input px-3 py-2 rounded-lg focus:outline-none">
                                <button onclick="saveTimeLog(${t.id})" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold px-3 py-2 rounded-lg transition">Зберегти</button>
                            </div>

                            ${t.timeLogs.length > 0 ? `
                                <div class="mt-1 space-y-1">
                                    ${t.timeLogs.slice(-3).map(log => `
                                        <div class="flex justify-between items-center text-[11px] opacity-70 pl-2 border-l-2 border-indigo-500/30">
                                            <span class="truncate pr-2">${log.comment || 'Без коментаря'}</span>
                                            <span class="shrink-0 font-mono text-indigo-300">+${log.minutes} хв</span>
                                        </div>
                                    `).join('')}
                                    ${t.timeLogs.length > 3 ? `<p class="text-[10px] opacity-40 pl-2">та ще ${t.timeLogs.length - 3} записів...</p>` : ''}
                                </div>
                            ` : ''}
                        </div>
                    `;
                    tasksContainer.appendChild(taskEl);
                });
                
                updateCountdowns();
            }
        }

        // --- ДОДАВАННЯ ЗАВДАННЯ ---
        taskForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const title = document.getElementById('taskTitle').value.trim();
            const desc = document.getElementById('taskDesc').value.trim();
            const date = document.getElementById('taskDate').value;
            const priority = document.getElementById('taskPriority').value;

            if (title) {
                tasks.unshift({
                    id: Date.now(),
                    project_id: activeProjectId === 'all' || activeProjectId === 'none' ? null : activeProjectId,
                    title: title,
                    description: desc,
                    due_date: date,
                    status: 'todo',
                    priority: priority,
                    timeLogs: [],
                    completed_at: null
                });
                
                document.getElementById('taskTitle').value = '';
                document.getElementById('taskDesc').value = '';
                document.getElementById('taskDate').value = '';
                
                saveDb();
                updateMainView();
            }
        });

        // --- 1. ФІКСАЦІЯ ЧАСУ ПРИ ЗМІНІ СТАТУСУ ТА ПЕРЕВІРКА ---
        window.changeTaskStatus = function(id, newStatus) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                const now = new Date().getTime();
                const isOverdue = task.due_date && new Date(task.due_date).getTime() < now;

                if (isOverdue && task.status !== 'done') {
                    alert("Це завдання прострочене, його статус більше не можна змінити!");
                    updateMainView();
                    return;
                }

                task.status = newStatus;
                if (newStatus === 'done') {
                    task.completed_at = new Date().toISOString();
                } else {
                    task.completed_at = null;
                }
                
                saveDb();
                updateMainView();
            }
        }

        // --- ВИДАЛЕННЯ ТА ІНШІ ФУНКЦІЇ ---
        window.deleteTask = function(id) {
            if(confirm('Ви точно хочете видалити це завдання?')) {
                tasks = tasks.filter(t => t.id !== id);
                saveDb();
                updateMainView();
            }
        }

        window.toggleTimeForm = function(id) {
            const form = document.getElementById(`timeform-${id}`);
            if (form.classList.contains('hidden')) {
                form.classList.remove('hidden');
            } else {
                form.classList.add('hidden');
            }
        }

        window.saveTimeLog = function(id) {
            const minsInput = document.getElementById(`time-mins-${id}`);
            const descInput = document.getElementById(`time-desc-${id}`);
            const mins = parseInt(minsInput.value);
            const desc = descInput.value.trim();

            if (mins && mins > 0) {
                const task = tasks.find(t => t.id === id);
                if (task) {
                    task.timeLogs.push({
                        minutes: mins,
                        comment: desc,
                        date: new Date().toISOString()
                    });
                    saveDb();
                    updateMainView();
                }
            }
        }

        window.updateCountdowns = function() {
            // Тут можна додати логіку інтервального оновлення таймерів, якщо потрібно
        }

        window.logout = function() {
            alert('Тут має бути ваша логіка виходу з акаунту');
        }

        // --- ПЕРВИННИЙ ЗАПУСК ---
        renderProjects();
        updateMainView();
        updateGlobalStats();
    </script>
</body>
</html>
