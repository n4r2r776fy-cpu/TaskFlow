<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Завдання</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        .priority-low { color: #34d399; background: rgba(52, 211, 153, 0.1); }
        .priority-medium { color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
        .priority-high { color: #f87171; background: rgba(248, 113, 113, 0.1); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <script src="app.js"></script>

    <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col hidden md:flex">
        <div class="p-5 border-b border-slate-800 flex items-center justify-between">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <span class="bg-indigo-600 p-1.5 rounded-lg">📋</span> TaskFlow
            </h1>
        </div>
        
        <div class="p-4 flex-1 overflow-y-auto">
            <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Твої проєкти</h2>
            <ul id="projectList" class="space-y-1">
                </ul>
        </div>

        <div class="p-4 border-t border-slate-800">
            <form id="projectForm" class="flex gap-2 mb-4">
                <input type="text" id="newProjectName" placeholder="Новий проєкт..." class="w-full bg-slate-800 text-sm rounded-lg px-3 py-2 border border-slate-700 focus:border-indigo-500 outline-none" required>
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 rounded-lg px-3 py-2 text-white font-bold">+</button>
            </form>

            <div class="flex items-center justify-between text-sm text-slate-400">
                <span id="userNameDisplay">User</span>
                <button onclick="Auth.logout()" class="hover:text-rose-400 transition">Вийти</button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto p-6 lg:p-10 relative">
        <header class="flex justify-between items-end mb-8">
            <div>
                <h2 id="currentProjectTitle" class="text-3xl font-bold mb-2">Оберіть проєкт</h2>
                <p class="text-slate-400 text-sm">Керуй своїми завданнями та досягай цілей швидше.</p>
            </div>
            <button id="deleteProjectBtn" onclick="deleteCurrentProject()" class="text-rose-500 hover:text-rose-400 text-sm font-medium hidden flex items-center gap-2">
                🗑 Видалити проєкт
            </button>
        </header>

        <div id="taskFormContainer" class="glass-panel border border-slate-700 rounded-2xl p-4 mb-8 hidden">
            <form id="taskForm" class="flex flex-wrap gap-3 items-center">
                <input type="text" id="taskTitle" placeholder="Що потрібно зробити?" class="flex-1 bg-transparent border-none outline-none text-white placeholder-slate-500 min-w-[200px]" required>
                
                <input type="text" id="taskDesc" placeholder="Деталі (необов'язково)..." class="flex-1 bg-slate-800/50 rounded-lg px-3 py-2 text-sm border border-slate-700 outline-none min-w-[150px]">
                
                <select id="taskPriority" class="bg-slate-800 text-sm rounded-lg px-3 py-2 border border-slate-700 outline-none">
                    <option value="low">Низький пріоритет</option>
                    <option value="medium" selected>Середній пріоритет</option>
                    <option value="high">Високий пріоритет</option>
                </select>

                <input type="date" id="taskDate" class="bg-slate-800 text-sm rounded-lg px-3 py-2 border border-slate-700 outline-none cursor-pointer">
                
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg px-6 py-2 transition shadow-lg">Додати</button>
            </form>
        </div>

        <div id="tasksContainer" class="space-y-3">
            <div id="emptyState" class="text-center py-20 text-slate-500 hidden">
                <p>Тут поки порожньо. Створіть проєкт або додайте завдання.</p>
            </div>
        </div>
    </main>

    <script>
        // 1. Перевірка авторизації
        Auth.requireAuth();
        const currentUser = Auth.getCurrentUser();
        document.getElementById('userNameDisplay').innerText = currentUser.username;

        // Стан сторінки
        let activeProjectId = null;

        // Елементи DOM
        const projectListEl = document.getElementById('projectList');
        const projectFormEl = document.getElementById('projectForm');
        const tasksContainerEl = document.getElementById('tasksContainer');
        const taskFormContainer = document.getElementById('taskFormContainer');
        const taskFormEl = document.getElementById('taskForm');
        const currentProjectTitleEl = document.getElementById('currentProjectTitle');
        const emptyStateEl = document.getElementById('emptyState');
        const deleteProjectBtn = document.getElementById('deleteProjectBtn');

        // 2. РЕНДЕР ПРОЄКТІВ
        function renderProjects() {
            const projects = Projects.getAll();
            projectListEl.innerHTML = '';
            
            if(projects.length > 0 && !activeProjectId) {
                activeProjectId = projects[0].id; // Обираємо перший за замовчуванням
            }

            projects.forEach(p => {
                const isActive = p.id === activeProjectId;
                const li = document.createElement('li');
                li.innerHTML = `
                    <button onclick="selectProject('${p.id}')" class="w-full text-left px-3 py-2 rounded-lg text-sm transition font-medium ${isActive ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}">
                        ${p.name}
                    </button>
                `;
                projectListEl.appendChild(li);
            });

            updateMainView();
        }

        // 3. ВИБІР ПРОЄКТУ
        window.selectProject = function(id) {
            activeProjectId = id;
            renderProjects();
        }

        // 4. ДОДАВАННЯ ПРОЄКТУ
        projectFormEl.addEventListener('submit', (e) => {
            e.preventDefault();
            const nameInput = document.getElementById('newProjectName');
            const name = nameInput.value.trim();
            if(name) {
                const newProject = Projects.create(name);
                activeProjectId = newProject.id;
                nameInput.value = '';
                renderProjects();
            }
        });

        // ВИДАЛЕННЯ ПРОЄКТУ
        window.deleteCurrentProject = function() {
            if(confirm('Видалити цей проєкт з усіма завданнями?')) {
                Projects.delete(activeProjectId);
                activeProjectId = null;
                renderProjects();
            }
        }

        // 5. РЕНДЕР ЗАВДАНЬ
        function updateMainView() {
            if (!activeProjectId) {
                currentProjectTitleEl.innerText = "Створіть або оберіть проєкт";
                taskFormContainer.classList.add('hidden');
                deleteProjectBtn.classList.add('hidden');
                tasksContainerEl.innerHTML = '';
                emptyStateEl.classList.remove('hidden');
                tasksContainerEl.appendChild(emptyStateEl);
                return;
            }

            const projects = Projects.getAll();
            const currentProject = projects.find(p => p.id === activeProjectId);
            
            if(currentProject) {
                currentProjectTitleEl.innerText = currentProject.name;
                taskFormContainer.classList.remove('hidden');
                deleteProjectBtn.classList.remove('hidden');
            }

            const tasks = Tasks.getAll(activeProjectId);
            tasksContainerEl.innerHTML = '';

            if (tasks.length === 0) {
                emptyStateEl.classList.remove('hidden');
                tasksContainerEl.appendChild(emptyStateEl);
            } else {
                emptyStateEl.classList.add('hidden');
                
                tasks.forEach(task => {
                    const isDone = task.status === 'done';
                    const isInProgress = task.status === 'in_progress';
                    
                    // Переклад пріоритетів
                    const priorityLabels = { 'low': 'Низький', 'medium': 'Середній', 'high': 'Високий' };
                    
                    // Відображення дедлайну
                    let dateHtml = '';
                    if(task.due_date) {
                        dateHtml = `<span class="text-xs font-mono bg-slate-800 px-2 py-1 rounded text-slate-300 border border-slate-700">🗓 ${task.due_date}</span>`;
                    }

                    const taskEl = document.createElement('div');
                    taskEl.className = `glass-panel p-4 rounded-xl border border-slate-700 flex flex-col sm:flex-row gap-4 items-start sm:items-center transition ${isDone ? 'opacity-50' : ''}`;
                    
                    taskEl.innerHTML = `
                        <div class="flex items-center gap-3 flex-1 min-w-0 w-full">
                            <input type="checkbox" ${isDone ? 'checked' : ''} onchange="toggleTaskDone('${task.id}', this.checked)" class="w-5 h-5 rounded border-slate-600 bg-slate-800 focus:ring-indigo-500 cursor-pointer flex-shrink-0">
                            
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 mb-1">
                                    <h4 class="font-semibold text-sm truncate ${isDone ? 'line-through text-slate-400' : 'text-white'}">${task.title}</h4>
                                    <span class="text-[10px] uppercase font-bold px-2 py-0.5 rounded-full priority-${task.priority}">
                                        ${priorityLabels[task.priority]}
                                    </span>
                                </div>
                                ${task.description ? `<p class="text-xs text-slate-400 truncate">${task.description}</p>` : ''}
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-3 w-full sm:w-auto justify-between sm:justify-end border-t sm:border-t-0 border-slate-700 pt-3 sm:pt-0 mt-2 sm:mt-0">
                            ${dateHtml}
                            
                            <select onchange="changeTaskStatus('${task.id}', this.value)" class="text-xs bg-slate-800 border border-slate-600 rounded px-2 py-1 outline-none cursor-pointer" ${isDone ? 'disabled' : ''}>
                                <option value="todo" ${task.status === 'todo' ? 'selected' : ''}>До виконання</option>
                                <option value="in_progress" ${task.status === 'in_progress' ? 'selected' : ''}>⏳ У процесі</option>
                            </select>

                            <button onclick="window.location.href='timelogs.html?taskId=${task.id}'" class="text-xs bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1.5 rounded flex items-center gap-1 transition">
                                ⏱ Трекінг часу
                            </button>
                        </div>
                    `;
                    tasksContainerEl.appendChild(taskEl);
                });
            }
        }

        // 6. СТВОРЕННЯ ЗАВДАННЯ
        taskFormEl.addEventListener('submit', (e) => {
            e.preventDefault();
            const title = document.getElementById('taskTitle').value.trim();
            const desc = document.getElementById('taskDesc').value.trim();
            const priority = document.getElementById('taskPriority').value;
            const dueDate = document.getElementById('taskDate').value;

            if (title && activeProjectId) {
                Tasks.create(activeProjectId, title, desc, priority, dueDate);
                
                // Очистка форми
                document.getElementById('taskTitle').value = '';
                document.getElementById('taskDesc').value = '';
                document.getElementById('taskDate').value = '';
                
                renderProjects(); // Оновлюємо UI
            }
        });

        // 7. ЗМІНА СТАТУСУ (Чекбокс "Виконано" або селект "У процесі")
        window.changeTaskStatus = function(taskId, status) {
            Tasks.changeStatus(taskId, status);
            renderProjects();
        }

        window.toggleTaskDone = function(taskId, isChecked) {
            const newStatus = isChecked ? 'done' : 'todo';
            Tasks.changeStatus(taskId, newStatus);
            renderProjects();
        }

        // Ініціалізація
        renderProjects();
    </script>
</body>
</html>
