<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Реєстрація</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <script src="app.js"></script>

    <div class="glass-panel w-full max-w-md p-8 rounded-2xl border border-slate-700 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold flex items-center justify-center gap-2 mb-2">
                <span class="bg-indigo-600 p-2 rounded-xl text-white">📋</span> TaskFlow
            </h1>
            <p class="text-slate-400">Створіть новий акаунт для початку роботи.</p>
        </div>

        <div id="errorMsg" class="hidden bg-rose-500/10 border border-rose-500/50 text-rose-500 text-sm p-3 rounded-lg mb-4 text-center">
            Помилка реєстрації
        </div>

        <div id="successMsg" class="hidden bg-emerald-500/10 border border-emerald-500/50 text-emerald-500 text-sm p-3 rounded-lg mb-4 text-center">
            Реєстрація успішна! Перенаправлення...
        </div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Ім'я користувача (Username)</label>
                <input type="text" id="username" required 
                    class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition" 
                    placeholder="Ваше ім'я">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Email</label>
                <input type="email" id="email" required 
                    class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition" 
                    placeholder="name@example.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Пароль</label>
                <input type="password" id="password" required 
                    class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition" 
                    placeholder="••••••••">
            </div>

            <button type="submit" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition shadow-lg shadow-indigo-500/20 mt-4">
                Зареєструватися
            </button>
        </form>

        <p class="text-center text-sm text-slate-400 mt-6">
            Вже маєте акаунт? <a href="login.html" class="text-indigo-400 hover:text-indigo-300 font-medium transition">Увійти</a>
        </p>
    </div>

    <script>
        // Якщо користувач вже авторизований, одразу кидаємо його на завдання
        if (Auth.getCurrentUser()) {
            window.location.href = 'tasks.html';
        }

        const registerForm = document.getElementById('registerForm');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        registerForm.addEventListener('submit', (e) => {
            e.preventDefault(); 
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            // Скидаємо повідомлення
            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            // Викликаємо реєстрацію з app.js
            const result = Auth.register(username, email, password);
            
            if (result.success) {
                // Показуємо зелену плашку
                successMsg.classList.remove('hidden');
                
                // Чекаємо 1.5 секунди і перекидаємо на сторінку логіну
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } else {
                // Показуємо червону плашку з текстом помилки (наприклад, "Email вже існує")
                errorMsg.innerText = result.msg;
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
