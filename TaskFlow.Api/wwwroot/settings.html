<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій профіль - TaskFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #020617; --text-main: #f8fafc; --glass-bg: rgba(15, 23, 42, 0.6); --border: rgba(255, 255, 255, 0.05); }
        .light-theme { --bg-color: #f4f4f2; --text-main: #1c1c1e; --glass-bg: rgba(255, 255, 255, 0.4); --border: rgba(0, 0, 0, 0.08); }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); transition: all 0.5s ease; }
        .bg-grid { position: fixed; inset: 0; background-image: radial-gradient(var(--border) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; opacity: 0.4; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--border); }
        .input-glass { background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: inherit; }
        .light-theme .input-glass { background: rgba(255,255,255,0.5); }
    </style>
</head>
<body class="min-h-screen pb-20">
    <div class="bg-grid"></div>

    <nav class="glass border-b h-20 mb-8 sticky top-0 z-50">
        <div class="max-w-3xl mx-auto px-6 h-full flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="javascript:history.back()" class="opacity-50 hover:opacity-100 transition">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
                </a>
                <span class="font-black text-xl tracking-tight">Налаштування</span>
            </div>
            
            <button id="themeToggle" class="w-10 h-10 flex items-center justify-center rounded-xl border border-white/10 glass hover:scale-110 transition">
                <svg id="sunIcon" class="hidden" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
                <svg id="moonIcon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
            </button>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-6 space-y-6" id="mainContent">
        </main>

    <script>
        const body = document.body;
        const toggleBtn = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');
        const mainContent = document.getElementById('mainContent');

        // Логіка теми (працює завжди)
        function setTheme(theme) {
            if (theme === 'light') {
                body.classList.add('light-theme');
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                body.classList.remove('light-theme');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
            localStorage.setItem('theme', theme);
        }
        setTheme(localStorage.getItem('theme') || 'dark');
        toggleBtn.addEventListener('click', () => setTheme(body.classList.contains('light-theme') ? 'dark' : 'light'));

        // Логіка профілю
        function renderProfile() {
            const token = localStorage.getItem('token');
            
            if (!token) {
                // ДЛЯ ГОСТЯ
                mainContent.innerHTML = `
                    <div class="glass rounded-[32px] p-12 text-center border-dashed border-2 border-white/10 opacity-80 mt-10">
                        <div class="w-16 h-16 bg-slate-800 rounded-2xl mx-auto flex items-center justify-center mb-6">
                            <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" class="text-slate-500" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                        </div>
                        <h2 class="text-2xl font-black mb-4">Приватна зона</h2>
                        <p class="text-slate-400 mb-8 max-w-sm mx-auto">Увійдіть або зареєструйтесь, щоб переглядати статистику та керувати своїм профілем.</p>
                        <div class="flex gap-4 justify-center">
                            <a href="login.html" class="px-8 py-3 bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-700 transition">Увійти</a>
                            <a href="index.html" class="px-8 py-3 glass font-bold rounded-2xl hover:bg-white/5 transition">На головну</a>
                        </div>
                    </div>
                `;
                return;
            }

            // ДЛЯ АВТОРИЗОВАНОГО КОРИСТУВАЧА
            // Дістаємо дані
            const userName = localStorage.getItem('userName') || 'Користувач';
            const userEmail = localStorage.getItem('userEmail') || 'user@taskflow.com';
            const firstLetter = userName.charAt(0).toUpperCase();
            
            // Рахуємо статистику завдань
            const tasks = JSON.parse(localStorage.getItem('tasks')) || [];
            const totalTasks = tasks.length;
            const completedTasks = tasks.filter(t => t.completed).length;

            mainContent.innerHTML = `
                <div class="glass p-8 rounded-[32px] flex items-center gap-6">
                    <div class="w-20 h-20 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-3xl flex items-center justify-center text-3xl font-black text-white shadow-lg">
                        ${firstLetter}
                    </div>
                    <div>
                        <h1 class="text-2xl font-black tracking-tight mb-1">${userName}</h1>
                        <p class="text-sm text-slate-400">${userEmail}</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="glass p-6 rounded-[24px]">
                        <p class="text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Усього завдань</p>
                        <p class="text-3xl font-black text-indigo-500">${totalTasks}</p>
                    </div>
                    <div class="glass p-6 rounded-[24px]">
                        <p class="text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Виконано</p>
                        <p class="text-3xl font-black text-emerald-500">${completedTasks}</p>
                    </div>
                </div>

                <div class="glass p-8 rounded-[32px]">
                    <h2 class="text-lg font-black mb-6">Особисті дані</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold uppercase opacity-50 mb-2 ml-1">Ім'я відображення</label>
                            <input type="text" id="nameInput" value="${userName}" class="w-full px-5 py-4 rounded-2xl input-glass focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition">
                        </div>
                        <button onclick="saveProfile()" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-700 transition shadow-lg shadow-indigo-500/20">
                            Зберегти зміни
                        </button>
                    </div>
                </div>

                <div class="pt-6">
                    <button onclick="logout()" class="w-full py-4 border-2 border-rose-500/20 text-rose-500 font-bold rounded-2xl hover:bg-rose-500 hover:text-white transition">
                        Вийти з акаунту
                    </button>
                </div>
            `;
        }

        // Функція збереження імені
        window.saveProfile = function() {
            const newName = document.getElementById('nameInput').value.trim();
            if (newName) {
                localStorage.setItem('userName', newName);
                renderProfile(); // Оновлюємо інтерфейс миттєво
                
                // Маленький візуальний фідбек
                const btn = document.querySelector('button[onclick="saveProfile()"]');
                btn.innerText = "Збережено!";
                btn.classList.replace('bg-indigo-600', 'bg-emerald-500');
                setTimeout(() => {
                    btn.innerText = "Зберегти зміни";
                    btn.classList.replace('bg-emerald-500', 'bg-indigo-600');
                }, 2000);
            }
        }

        // Надійний вихід
        window.logout = function() {
            localStorage.removeItem('token');
            // Можна також очистити завдання, якщо хочеш повний "скид" при виході:
            // localStorage.removeItem('tasks'); 
            window.location.replace('index.html');
        }
        // Запускаємо рендер при завантаженні
        renderProfile();
    </script>
</body>
</html>
