<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Трекінг часу (Admin)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex overflow-hidden text-slate-800">

    <aside class="w-72 bg-slate-900 text-white flex flex-col shadow-2xl z-20">
        <div class="h-20 flex items-center px-6 border-b border-slate-800 shrink-0">
            <div class="flex items-center gap-3 text-indigo-400">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                <span class="text-xl font-extrabold tracking-wide text-white">TaskFlow</span>
            </div>
        </div>

        <div class="p-4 border-b border-slate-800">
            <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4 px-2">Меню</h3>
            <ul class="space-y-1">
                <li>
                    <a href="tasks.html" class="px-3 py-2.5 rounded-lg transition-all flex items-center gap-3 font-medium text-sm text-slate-300 hover:bg-slate-800 hover:text-white cursor-pointer">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                        Дашборд
                    </a>
                </li>
                <li>
                    <a href="timelogs.html" class="px-3 py-2.5 rounded-lg transition-all flex items-center gap-3 font-medium text-sm bg-indigo-600 text-white shadow-md shadow-indigo-900/20 cursor-pointer">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                        Трекінг часу
                    </a>
                </li>
            </ul>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <header class="bg-white border-b border-slate-200 px-8 py-4 flex items-center justify-between shadow-sm shrink-0 min-h-[5rem]">
            <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-3">
                <span class="text-indigo-500">⏱</span> Управління часом (Адмін)
            </h2>
            <button onclick="logout()" class="text-sm font-bold text-slate-500 hover:text-red-500 bg-slate-100 hover:bg-red-50 px-4 py-2 rounded-lg transition-all">
                Вийти
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-8 relative">
            
            <div class="mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-lg font-bold text-slate-800 mb-4">Додати запис часу</h3>
                <form id="createTimeLogForm" class="flex flex-col md:flex-row gap-4 items-end">
                    
                    <div class="flex-1 w-full">
                        <label class="block text-xs font-semibold text-slate-500 uppercase mb-1 px-1">Завдання</label>
                        <select id="taskSelect" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all font-medium appearance-none cursor-pointer">
                            <option value="" disabled selected>Завантаження завдань...</option>
                        </select>
                    </div>

                    <div class="w-full md:w-32">
                        <label class="block text-xs font-semibold text-slate-500 uppercase mb-1 px-1">Годин</label>
                        <input type="number" id="timeHours" placeholder="0" min="0" step="0.5" required
                               class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all font-medium text-center">
                    </div>

                    <div class="flex-2 w-full">
                        <label class="block text-xs font-semibold text-slate-500 uppercase mb-1 px-1">Коментар</label>
                        <input type="text" id="timeDesc" placeholder="Що було зроблено..." required
                               class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all text-sm">
                    </div>

                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg shadow-indigo-200 transition-all active:scale-95 whitespace-nowrap h-[50px]">
                        Зберегти
                    </button>
                </form>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200 text-xs uppercase tracking-wider text-slate-500">
                                <th class="px-6 py-4 font-semibold">Дата</th>
                                <th class="px-6 py-4 font-semibold">Завдання</th>
                                <th class="px-6 py-4 font-semibold">Коментар</th>
                                <th class="px-6 py-4 font-semibold text-center">Витрачено</th>
                                <th class="px-6 py-4 font-semibold text-right">Дії</th>
                            </tr>
                        </thead>
                        <tbody id="timeLogsTableBody" class="divide-y divide-slate-100">
                            <tr>
                                <td colspan="5" class="px-6 py-8 text-center text-slate-400 animate-pulse">
                                    Завантаження історії...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script>
        // ==========================================
        // 1. АВТОРИЗАЦІЯ ТА ПЕРЕВІРКА РОЛІ АДМІНА
        // ==========================================
        // ВИПРАВЛЕНО: Змінив "jwtToken" на "token", щоб співпадало з логіном!
        const token = localStorage.getItem("token"); 
        
        if (!token) {
            window.location.href = "login.html";
        } else {
            // Розшифровуємо JWT токен
            function parseJwt(t) {
                try {
                    const base64Url = t.split('.')[1];
                    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                    const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                    }).join(''));
                    return JSON.parse(jsonPayload);
                } catch (e) {
                    return null;
                }
            }

            const tokenData = parseJwt(token);
            // У C# ролі часто записуються під цим довгим ключем
            const roleClaim = "http://schemas.microsoft.com/ws/2008/06/identity/claims/role";
            const userRole = tokenData ? (tokenData[roleClaim] || tokenData.role) : null;

            // Якщо користувач не Admin, блокуємо доступ
            if (userRole !== "Admin") {
                alert("Доступ заборонено! Ця сторінка доступна лише для адміністраторів.");
                window.location.href = "tasks.html"; // Повертаємо на головну (змінив на tasks.html)
            }
        }

        // ВИПРАВЛЕНО: Замінив localhost на відносний шлях!
        const API_BASE = "/api"; 
        let allTasks = [];

        // ==========================================
        // 2. ЗАВАНТАЖЕННЯ ДАНИХ ТА ЛОГІКА СТОРІНКИ
        // ==========================================

        async function loadTasksForSelect() {
            try {
                const response = await fetch(`${API_BASE}/Tasks`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                if (response.ok) {
                    allTasks = await response.json();
                    const select = document.getElementById("taskSelect");
                    select.innerHTML = `<option value="" disabled selected>Оберіть завдання...</option>`;
                    
                    if(allTasks.length === 0) {
                        select.innerHTML = `<option value="" disabled selected>Немає доступних завдань</option>`;
                        return;
                    }

                    allTasks.forEach(task => {
                        const id = task.id || task.Id;
                        const title = task.title || task.Title;
                        const status = task.status || task.Status;
                        const prefix = status === "done" ? "✅ " : "⏳ ";
                        select.innerHTML += `<option value="${id}">${prefix}${title}</option>`;
                    });
                }
            } catch (error) {
                console.error("Помилка завантаження завдань:", error);
            }
        }

        async function loadTimeLogs() {
            const tbody = document.getElementById("timeLogsTableBody");
            try {
                const response = await fetch(`${API_BASE}/TimeLogs`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const logs = await response.json();
                    renderTimeLogs(logs);
                } else {
                    tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-red-400">Помилка завантаження. Перевір TimeLogsController на бекенді.</td></tr>`;
                }
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-red-400">Немає зв'язку з сервером.</td></tr>`;
            }
        }

        function renderTimeLogs(logs) {
            const tbody = document.getElementById("timeLogsTableBody");
            tbody.innerHTML = "";

            const logsArray = Array.isArray(logs) ? logs : (logs.$values || logs.data || []);

            if (logsArray.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="px-6 py-12 text-center text-slate-500">
                            <div class="flex justify-center mb-3 text-slate-300">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                            </div>
                            Жодного запису часу не знайдено.
                        </td>
                    </tr>`;
                return;
            }

            logsArray.sort((a, b) => new Date(b.date || b.Date || b.createdAt || 0) - new Date(a.date || a.Date || a.createdAt || 0));

            logsArray.forEach(log => {
                const id = log.id || log.Id;
                const hours = log.hours || log.Hours || 0;
                const desc = log.description || log.Description || "Без коментаря";
                const dateRaw = log.date || log.Date || log.createdAt || new Date().toISOString();
                const taskId = log.taskId || log.TaskId;

                let taskName = "Невідоме завдання";
                if (log.task && log.task.title) {
                    taskName = log.task.title;
                } else {
                    const foundTask = allTasks.find(t => (t.id || t.Id) == taskId);
                    if (foundTask) taskName = foundTask.title || foundTask.Title;
                }

                const formattedDate = new Date(dateRaw).toLocaleDateString('uk-UA', { 
                    day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute:'2-digit' 
                });

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors group">
                        <td class="px-6 py-4 text-sm text-slate-500 whitespace-nowrap">${formattedDate}</td>
                        <td class="px-6 py-4 font-medium text-slate-800">${taskName}</td>
                        <td class="px-6 py-4 text-sm text-slate-600">${desc}</td>
                        <td class="px-6 py-4 text-center">
                            <span class="inline-block px-3 py-1 bg-indigo-50 text-indigo-700 font-bold text-xs rounded-full border border-indigo-100">
                                ${hours} год
                            </span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="deleteTimeLog(${id})" class="text-slate-400 hover:text-red-500 transition-colors p-1 opacity-0 group-hover:opacity-100 focus:opacity-100" title="Видалити запис">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        document.getElementById("createTimeLogForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const taskId = document.getElementById("taskSelect").value;
            const hours = document.getElementById("timeHours").value;
            const desc = document.getElementById("timeDesc").value;
            
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "Зберігаю...";
            btn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/TimeLogs`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                    body: JSON.stringify({ 
                        taskId: parseInt(taskId), 
                        timeSpent: parseFloat(hours), 
                        comment: desc,                
                        loggedAt: new Date().toISOString() 
                    })
                });

                if (response.ok) {
                    document.getElementById("timeHours").value = "";
                    document.getElementById("timeDesc").value = "";
                    loadTimeLogs(); 
                } else {
                    alert("Помилка при збереженні.");
                }
            } catch (error) { 
                console.error(error); 
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });

        async function deleteTimeLog(id) {
            if (!confirm("Видалити цей запис часу?")) return;
            try {
                const response = await fetch(`${API_BASE}/TimeLogs/${id}`, {
                    method: "DELETE",
                    headers: { "Authorization": `Bearer ${token}` }
                });
                if (response.ok) loadTimeLogs();
            } catch (error) { console.error(error); }
        }

        function logout() {
            // ВИПРАВЛЕНО: Тепер видаляє правильний токен при виході
            localStorage.removeItem("token"); 
            window.location.href = "login.html";
        }

        // Запуск
        loadTasksForSelect().then(loadTimeLogs);
    </script>
</body>
</html>
